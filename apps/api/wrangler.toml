name = "codeempty-api"
main = "src/index.ts"
compatibility_date = "2024-04-16"
type = "service"

# Cloudflare KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "codeempty-kv"
preview_id = "codeempty-kv-preview"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "codeempty-db"
database_id = "codeempty-db-id"

# R2 Bucket Binding for Images
[[r2_buckets]]
binding = "R2_IMAGES"
bucket_name = "codeempty-images"
preview_bucket_name = "codeempty-images-preview"

# Environment variables
[env.production]
vars = { ENVIRONMENT = "production", API_URL = "https://api.codeempty.com" }

[env.preview]
vars = { ENVIRONMENT = "preview", API_URL = "http://localhost:8787" }

# Routes configuration
routes = [
  { pattern = "codeempty.com/api/*", zone_name = "codeempty.com" }
]
